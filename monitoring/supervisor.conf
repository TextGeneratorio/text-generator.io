# Supervisor config for E2E monitoring
# Add to /etc/supervisor/conf.d/e2e-monitor.conf

[program:e2e-monitor]
command=/nvme0n1-disk/code/text-generator.io/.venv/bin/python /nvme0n1-disk/code/text-generator.io/monitoring/run_monitor.py --daemon --interval 3600 --auto-fix
directory=/nvme0n1-disk/code/text-generator.io
user=administrator
autostart=true
autorestart=true
stdout_logfile=/nvme0n1-disk/code/text-generator.io/monitoring/logs/supervisor_stdout.log
stderr_logfile=/nvme0n1-disk/code/text-generator.io/monitoring/logs/supervisor_stderr.log
environment=PATH="/nvme0n1-disk/code/text-generator.io/.venv/bin:%(ENV_PATH)s"

[program:text-generator-500-monitor]
command=/nvme0n1-disk/code/text-generator.io/.venv/bin/python /nvme0n1-disk/code/text-generator.io/monitoring/monitor_500s.py --daemon --interval 900 --auto-fix
directory=/nvme0n1-disk/code/text-generator.io
user=administrator
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/text-generator-500-monitor.log
stderr_logfile=/var/log/supervisor/text-generator-500-monitor-error.log
environment=PATH="/nvme0n1-disk/code/text-generator.io/.venv/bin:%(ENV_PATH)s",TEXTGEN_MONITORING_RUNTIME_DIR="/nvme0n1-disk/code/text-generator.io/monitoring/runtime"
